type: custom:apexcharts-card
graph_span: 24h
stacked: true
header:
  show: true
  title: AC Cooling Hours
  show_states: true
  colorize_states: true
series:
  # Daily Cooling Hours (Stacked Area, Left Axis)
  - entity: sensor.hvac_cooling_peak
    name: Peak Hours
    type: area
    color: '#D500F9' # Purple
    stroke_width: 2
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: 'h'
    fill_raw: last
    extend_to: now
    show:
      in_header: false # Hide from header to keep it clean
  - entity: sensor.hvac_cooling_off_peak
    name: Off-Peak Hours
    type: area
    color: '#29B6F6' # Blue
    stroke_width: 2
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: 'h'
    fill_raw: last
    extend_to: now
    show:
      in_header: false # Hide from header to keep it clean
  - entity: sensor.hvac_cooling_super_off_peak
    name: Super Off-Peak Hours
    type: area
    color: '#F48FB1' # Pink
    stroke_width: 2
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: 'h'
    fill_raw: last
    extend_to: now
    show:
      in_header: false # Hide from header to keep it clean

  # Total Daily Cooling Hours (for header state display only)
  - entity: sensor.hvac_cooling
    name: Today's Runtime
    show:
      in_header: true
      in_chart: false
    float_precision: 2
    unit: 'h'

  # Overall Monthly Total (displayed in header)
  - entity: sensor.cooling_time_monthly
    name: Monthly Runtime
    show:
      in_header: true
      in_chart: false
    float_precision: 2
    unit: 'h'
yaxis:
  - id: runtime
    decimals: 1
    min: 0
    apex_config:
      title:
        text: Runtime (Hours)
      labels:
        style:
          colors: '#888888'
apex_config:
  chart:
    height: 220
    foreColor: '#888888'
  grid:
    borderColor: '#333333'
    strokeDashArray: 4
  stroke:
    width: 2
  tooltip:
    shared: true
    intersect: false

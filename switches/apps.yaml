motion_all:
  class: BooleanControlMotion
  module: boolean
  boolean: input_boolean.motion_all
  entities:
    - input_boolean.motion_office
    - input_boolean.motion_kitchen
    - input_boolean.motion_stairway
    - input_boolean.motion_sim

lights_off:
  class: BooleanControlLights
  module: boolean
  boolean: input_boolean.lights_all
  entities:
    - light.printer_upper
    - light.printer_lower
    - light.upstairs_light_1
    - light.upstairs_light_2
    - light.office_desk
    - light.living_room_main_lights
    - light.dining_room_table_lights
    - light.hallway_main_lights
    - light.office_main_lights
    - light.bar_main_lights
    - light.kitchen_main_lights
    - light.kitchen_under_cabinet
    - light.kitchen_above_cabinet
    - light.tv_lights
    - switch.sim_desk_light

switch_tv_lights:
  class: PowerControlledSwitch
  module: power_controlled_switch
  power_entity: sensor.living_room_tv_current_consumption
  switch_entity: light.tv_lights
  automation_switch: input_boolean.lights_tv_automation
  threshold_on: 30
  threshold_off: 25
  delay_on: 0
  delay_off: 30
  debug: False

switch_printer_lights:
  class: PowerControlledSwitch
  module: power_controlled_switch
  power_entity: sensor.3d_printer_current_consumption
  switch_entity: switch.printer_lights
  threshold_on: 10
  threshold_off: 5
  delay_on: 5
  delay_off: 10

sleep_c137:

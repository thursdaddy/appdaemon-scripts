type: custom:apexcharts-card
graph_span: 24h
stacked: true
header:
  show: true
  title: AC Cost Breakdown
  show_states: true
  colorize_states: true
series:
  # Daily Costs (Stacked Area, Left Axis)
  - entity: sensor.hvac_cost_peak
    name: Peak Cost
    type: area
    color: '#FF1744' # Red
    stroke_width: 2
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: '$'
    fill_raw: last
    extend_to: now
    show:
      in_header: false # Hide from header to keep it clean
  - entity: sensor.hvac_cost_off_peak
    name: Off-Peak Cost
    type: area
    color: '#FF9100' # Orange
    stroke_width: 2
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: '$'
    fill_raw: last
    extend_to: now
    show:
      in_header: false # Hide from header to keep it clean
  - entity: sensor.hvac_cost_super_off_peak
    name: Super Off-Peak Cost
    type: area
    color: '#00E676' # Green
    stroke_width: 2
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: '$'
    fill_raw: last
    extend_to: now
    show:
      in_header: false # Hide from header to keep it clean

  # Total Daily Cost (for header state display only)
  - entity: sensor.hvac_cost_tracker
    name: Today's Cost
    show:
      in_header: true
      in_chart: false
    float_precision: 2
    unit: '$'

  # Overall Monthly Total (displayed in header)
  - entity: sensor.cooling_cost_monthly
    name: Monthly Cost
    show:
      in_header: true
      in_chart: false
    float_precision: 2
    unit: '$'
yaxis:
  - id: cost
    decimals: 2
    min: 0
    apex_config:
      title:
        text: Cost ($)
      labels:
        style:
          colors: '#888888'
apex_config:
  chart:
    height: 220
    foreColor: '#888888'
  grid:
    borderColor: '#333333'
    strokeDashArray: 4
  stroke:
    width: 2
  tooltip:
    shared: true
    intersect: false

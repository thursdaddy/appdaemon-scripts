daily_espresso_off:
  class: SwitchControl
  module: switch_control
  time: "12:00:00"
  actions:
    - service: turn_off
      entity_id: switch.kitchen_espresso

daily_motion_on:
  class: SwitchControl
  module: switch_control
  time: "04:00:00"
  actions:
    - service: turn_off
      entity_id: input_boolean.motion_all
    - service: turn_on
      entity_id: input_boolean.motion_all

monitor_state_c137:
  class: ComputerStateMonitor
  module: computer
  ip: 192.168.10.137
  boolean: input_boolean.computer_c137

monitor_state_gamer:
  class: ComputerStateMonitor
  module: computer
  ip: 192.168.10.169
  boolean: input_boolean.computer_gamer

monitor_state_sim:
  class: ComputerStateMonitor
  module: computer
  ip: 192.168.10.116
  boolean: input_boolean.computer_sim

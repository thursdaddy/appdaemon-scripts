type: custom:apexcharts-card
graph_span: 24h
stacked: true
header:
  show: true
  title: AC Cost & Runtime Breakdown
  show_states: true
  colorize_states: true
series:
  # Daily Costs (Stacked Area, Left Axis)
  - entity: sensor.hvac_cost_peak
    name: Peak Cost
    type: area
    color: '#FF1744' # Red
    stroke_width: 2
    opacity: 0.3
    curve: smooth
    float_precision: 2
    unit: '$'
    yaxis_id: cost
    group: cost
    fill_raw: last
    extend_to: now
  - entity: sensor.hvac_cost_off_peak
    name: Off-Peak Cost
    type: area
    color: '#FF9100' # Orange
    stroke_width: 2
    opacity: 0.3
    curve: smooth
    float_precision: 2
    unit: '$'
    yaxis_id: cost
    group: cost
    fill_raw: last
    extend_to: now
  - entity: sensor.hvac_cost_super_off_peak
    name: Super Off-Peak Cost
    type: area
    color: '#00E676' # Green
    stroke_width: 2
    opacity: 0.3
    curve: smooth
    float_precision: 2
    unit: '$'
    yaxis_id: cost
    group: cost
    fill_raw: last
    extend_to: now

  # Daily Cooling Hours (Stacked Line, Right Axis)
  - entity: sensor.hvac_cooling_peak
    name: Peak Hours
    type: line
    color: '#D500F9' # Purple
    stroke_width: 2
    curve: smooth
    float_precision: 2
    unit: 'h'
    yaxis_id: runtime
    group: runtime
    fill_raw: last
    extend_to: now
  - entity: sensor.hvac_cooling_off_peak
    name: Off-Peak Hours
    type: line
    color: '#29B6F6' # Blue
    stroke_width: 2
    curve: smooth
    float_precision: 2
    unit: 'h'
    yaxis_id: runtime
    group: runtime
    fill_raw: last
    extend_to: now
  - entity: sensor.hvac_cooling_super_off_peak
    name: Super Off-Peak Hours
    type: line
    color: '#F48FB1' # Pink
    stroke_width: 2
    curve: smooth
    float_precision: 2
    unit: 'h'
    yaxis_id: runtime
    group: runtime
    fill_raw: last
    extend_to: now

  # Overall Monthly Total (displayed only in header)
  - entity: sensor.cooling_cost_monthly
    name: Monthly Total
    show:
      in_header: true
      in_chart: false
    float_precision: 2
    unit: '$'
yaxis:
  - id: cost
    decimals: 2
    min: 0
    apex_config:
      title:
        text: Cost ($)
      labels:
        style:
          colors: '#888888'
  - id: runtime
    opposite: true
    decimals: 1
    min: 0
    apex_config:
      title:
        text: Runtime (h)
      labels:
        style:
          colors: '#888888'
apex_config:
  chart:
    height: 300
    foreColor: '#888888'
  grid:
    borderColor: '#333333'
    strokeDashArray: 4
  stroke:
    width: 2
  tooltip:
    shared: true
    intersect: false

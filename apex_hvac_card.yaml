type: custom:apexcharts-card
graph_span: 24h
header:
  show: true
  title: AC Cost & Cooling Hours
  show_states: true
  colorize_states: true
series:
  - entity: sensor.hvac_cost_tracker
    name: Daily Cost
    type: area
    color: '#00E676'
    stroke_width: 3
    opacity: 0.25
    curve: smooth
    float_precision: 2
    unit: '$'
    yaxis_id: cost
    fill_raw: last
    extend_to: now
  - entity: sensor.hvac_cooling
    name: Cooling Hours
    type: line
    color: '#29B6F6'
    stroke_width: 2
    curve: smooth
    float_precision: 2
    unit: 'h'
    yaxis_id: runtime
    fill_raw: last
    extend_to: now
  - entity: sensor.cooling_cost_monthly
    name: Monthly Cost
    show:
      in_header: true
      in_chart: false
    float_precision: 2
    unit: '$'
yaxis:
  - id: cost
    decimals: 2
    min: 0
    apex_config:
      title:
        text: Cost ($)
      labels:
        style:
          colors: '#888888'
  - id: runtime
    opposite: true
    decimals: 1
    min: 0
    apex_config:
      title:
        text: Cooling (Hours)
      labels:
        style:
          colors: '#888888'
apex_config:
  chart:
    height: 250
    foreColor: '#888888'
  grid:
    borderColor: '#333333'
    strokeDashArray: 4
  stroke:
    width: [3, 2]
  tooltip:
    shared: true
    intersect: false

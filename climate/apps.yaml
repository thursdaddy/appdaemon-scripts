climate_control:
  module: hvac
  class: ClimateSchedule
  climate_entity: climate.nest
  forecast_sensor: sensor.forecast_today_high
  high_temp_threshold: 85
  climate_comfort_temp: 80
  super_off_peak_temp: 75.0
  off_peak_temp: 78.0
  on_peak_temp: 85.0
  schedule: &hvac_schedule
    on_peak:
      hours:
        - "17:00:00-22:00:00"
      weekdays_only: true
    super_off_peak:
      hours:
        - "08:00:00-15:00:00"
      weekdays_only: false

hvac_tracker:
  class: HVACCostTracker
  module: tracker
  estimated_wattage_kw: 4.1
  rates:
    summer:
      peak: 0.1257
      off_peak: 0.0995
      super_off_peak: 0.0393
    winter:
      peak: 0.1051
      off_peak: 0.0907
      super_off_peak: 0.0425
  schedule: *hvac_schedule


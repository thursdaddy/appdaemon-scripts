office_pico:
  class: PicoEvent
  module: pico_controller
  device_name: office
  actions:
    on:
      - service: turn_on
        entity_id: light.office_desk
    off:
      - service: turn_off
        entity_id: light.office_desk
    lower:
      - service: turn_off
        entity_id: input_boolean.computer_c137
    stop:
      - service: toggle
        entity_id: input_boolean.motion_office

living_room_pico:
  class: PicoEvent
  module: pico_controller
  device_name: livingroom
  actions:
    on:
      - service: turn_on
        entity_id: light.living_room_main_lights
    off:
      - service: turn_off
        entity_id: light.living_room_main_lights
    stop:
      - service: set_state_on
        entity_id: input_boolean.motion_office

sim_room_pico:
  class: PicoEvent
  module: pico_controller
  device_name: sim
  actions:
    on:
      - service: turn_on
        entity_id: input_boolean.activity_sim
    off:
      - service: turn_off
        entity_id: input_boolean.activity_sim
    lower:
      - service: toggle
        entity_id: switch.sim_fan
    raise:
      - service: toggle
        entity_id: switch.sim_spotlight

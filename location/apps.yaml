away_mode:
  class: AwayMode
  module: away

back_door_camera:
  class: CameraLockControl
  module: camera
  lock: lock_back_door
  camera: binary_sensor.back_door_person_detected
  wifi_sensor: sensor.pixel_7_pro_wi_fi_connection
  magnet: magnet_back_door

front_door_camera:
  class: CameraLockControl
  module: camera
  lock: lock_front_door
  camera: binary_sensor.g4_doorbell_person_detected
  wifi_sensor: sensor.pixel_7_pro_wi_fi_connection
  magnet: magnet_front_door

home_detection:
  class: LocationChange
  module: lights
  wifi_sensor: sensor.pixel_7_pro_wi_fi_connection
  delay: 120
  brightness: 50
  lights:
    - light.living_room_main_lights
    - light.hallway_main_lights
  schedule:
    day:
      start: sunrise
      end: sunset
      brightness: 50
      delay: 120
    evening:
      start: sunset
      end: "21:00:00"
      brightness: 50
      delay: 120
    night:
      start: "21:00:01"
      end: sunrise
      brightness: 50
      delay: 120
